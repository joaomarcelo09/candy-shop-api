services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - candy-shop-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: candy_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - candy-shop-network

volumes:
  postgres_data:

networks:
  candy-shop-network:
    driver: bridge
